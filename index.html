<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Ninja - Вопросы для подготовки к интервью</title>
    <link rel="icon" type="image/svg+xml" href="logo.SVG">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrap">
        <div class="top">
            <div class="logo-section">
                <img src="logo.SVG" alt="PM Ninja" class="logo">
                <div class="title-section">
                    <h1>🎯 PM Ninja</h1>
                    <p class="descriptor">Вопросы для подготовке к интервью на менеджера продукта</p>
                </div>
            </div>
        </div>

        <input type="text" id="search" placeholder="🔍 Поиск вопроса...">

        <div class="stats">
            <span id="favCount">⭐ 0</span>
            <span id="count" class="count"></span>
        </div>

        <div class="card">
            <div id="question">Загрузка...</div>
            <div class="company" id="company"></div>
            <button class="copy" id="copyBtn">📋 Скопировать</button>
        </div>

        <div class="actions">
            <button id="randomBtn" class="primary">Следующий вопрос</button>
            <button id="favBtn">⭐ В избранное</button>
        </div>

        <div class="card">
            <h3>Избранное</h3>
            <ul id="favorites"></ul>
        </div>
    </div>
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
